spring:
  application:
    name: ai-builder

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/codegen}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Password@123}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:false}

