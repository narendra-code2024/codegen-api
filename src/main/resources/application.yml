spring:
  application:
    name: ai-builder

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/codegen}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Password@123}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:false}

security:
  jwt:
    secret: ${JWT_SECRET:4a5e954fbc5218d6a365bb5a3bd96245e317c8052ebf337f7a14ad60c6d7a46e}
    expiration: ${JWT_EXPIRATION:900000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

